name: Build Xservis APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Flutter pub get
        run: flutter pub get
      - name: Build APK (debug, без подписи для теста)
        run: flutter build apk --debug --target-platform android-arm64 || flutter build apk --debug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: xservis-apk
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: warn
