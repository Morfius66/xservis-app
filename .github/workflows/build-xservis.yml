name: Build Xservis APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (no submodules yet)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fix submodule URL to HTTPS and init
        run: |
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule sync --recursive || true
          git submodule update --init --recursive || echo "submodule init warning"
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Flutter pub get
        run: flutter pub get || true
      - name: Run build_runner (generate code)
        run: dart run build_runner build --delete-conflicting-outputs || echo "build_runner warning"
      - name: Build APK
        run: flutter build apk --debug 2>&1 | tail -60
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: xservis-apk
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: warn
